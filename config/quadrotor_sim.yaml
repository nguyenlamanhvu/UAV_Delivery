model: UAV_models/skydio_2/quadrotor.urdf

plant:
  mass: 0.775
  gravity: 9.81
  arm_length: 0.15
  thrust_coeff: 1.0
  yaw_moment_coeff: 1.0e-2
  max_rotor_input: 5.0
  inertia: [0.0015, 0.0025, 0.0035]

initial_state:
  position: [0.0, 0.0, 1.0]
  rpy: [0.0, 0.0, 0.0]
  velocity: [0.0, 0.0, 0.0]
  body_angular_velocity: [0.0, 0.0, 0.0]

lcm_channels:
  command: UAV_QUADROTOR_COMMAND
  state: UAV_QUADROTOR_STATE
  reference: UAV_QUADROTOR_REFERENCE
  reference_trajectory: UAV_QUADROTOR_REFERENCE_TRAJECTORY
  sim_time: UAV_SIM_TIME

se3_controller:
  desired_position: [0.0, 0.0, 1.0]
  desired_velocity: [0.0, 0.0, 0.0]
  desired_yaw: 0.0
  kp_position: 4.0
  kd_position: 3.0
  kp_rotation: 1.5
  kd_angular: 0.3

trajectory:
  publish_rate: 100.0
  preview_horizon: 20
  preview_dt: 0.001
  waypoints:
    - time: 0.0
      position: [0.0, 0.0, 1.0]
      yaw: 0.0
    - time: 2.0
      position: [1.0, 0.0, 2.0]
      yaw: 0.0
    - time: 4.0
      position: [1.0, 1.0, 1.0]
      yaw: 1.57
    - time: 6.0
      position: [-1.0, 1.0, 1.0]
      yaw: 3.14
    - time: 8.0
      position: [-1.0, -1.0, 1.5]
      yaw: -1.57

publish_rate: 1000.0
realtime_rate: 1.0
sim_time: 20.0
console_log: true
console_period: 0.25
