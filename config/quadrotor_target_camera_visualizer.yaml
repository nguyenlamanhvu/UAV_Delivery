renderer: vtk
meshcat_port: 7002
visualizer_publish_rate: 60.0

camera:
  width: 640
  height: 480
  fov_deg: 75.0
  near: 0.02
  far: 50.0
  position: [0.18, 0.0, -0.03]
  pitch_down_deg: 25.0
  warmup_frames: 3

image_output:
  output_dir: /tmp/uav_delivery/drone_front_camera
  file_pattern: drone_front_{count:03}
  publish_period: 0.5

detection:
  enabled: true
  lcm_channel: UAV_RARUCO_DETECTION
  publish_period: 0.5
  warp_resolution: 240
  min_marker_area_px: 400.0
  min_normal_alignment: 0.25
  min_in_frame_fraction: 0.7
  max_mean_abs_error: 70.0
  overlay_output:
    enabled: true
    output_dir: /tmp/uav_delivery/drone_front_camera_raruco
    file_pattern: drone_front_raruco_{count:03}
    publish_period: 0.5
  marker:
    id: 0
    depth: 2
    inner_borders: 2
    external_border: true
    size_m: 0.4
    position: [0.0, 0.0, 0.221]
    rpy: [0.0, 0.0, 0.0]
